apiVersion: apps/v1
kind: Deployment
metadata:
  name: sri-app
  namespace: sri-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sri-app
  template:
    metadata:
      labels:
        app: sri-app
    spec:
      containers:
      - name: sri-app
        # Verified ECR name with hyphen
        image: 812698982757.dkr.ecr.ap-south-1.amazonaws.com/sri-ecr-repo:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /  # Updated from /health to / to match Nginx index.html
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /  # Updated from /health to / to match Nginx index.html
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
