apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
 name: sri-app-ingress
 namespace: sri-qa # change per environment
 annotations:
 kubernetes.io/ingress.class: "nginx"
spec:
 rules:
 - host: qa.sri-app.internal # qa.sri-app.internal / staging.sri-app.io / sri-app.io
 http:
 paths:
 - path: /
 pathType: Prefix
 backend:
 service:
 name: sri-app-service
 port: { number: 80 }
