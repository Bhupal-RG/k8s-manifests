apiVersion: apps/v1
kind: Deployment
metadata:
  name: sri-app
  namespace: sri-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sri-app
  template:
    metadata:
      labels:
        app: sri-app
    spec:
      containers:
      - name: sri-app
        image: 812698982757.dkr.ecr.ap-south-1.amazonaws.com/sri-ecrrepo:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
